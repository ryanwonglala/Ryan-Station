<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ryan Station music player and AI mood terminal.">
  <title>Music Zone - Acid Glitch Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="music-player.css">
</head>
<body data-page="music">
  <div class="grid-warp" aria-hidden="true"></div>
  <div class="scanlines" aria-hidden="true"></div>

  <aside class="playlist-sidebar" id="playlistSidebar">
    <button class="playlist-tab" id="playlistTab" aria-label="Toggle Playlist" data-i18n-aria-label="musicPlayer.playlistToggle">
      <span data-i18n="musicPlayer.playlist">Playlist</span>
      <i class="fas fa-music"></i>
    </button>
    <div class="playlist-shell">
      <header>
        <h2 data-i18n="musicPlayer.playQueue">Play Queue</h2>
        <p id="playlistCount">(0)</p>
      </header>
      <div class="playlist-items" id="playlistItems"></div>
    </div>
  </aside>

  <a href="index.html" class="back-home-btn" title="Back to Home" data-i18n-title="musicPlayer.home">
    <i class="fas fa-home"></i>
    <span data-i18n="musicPlayer.home">Home</span>
  </a>

  <div class="music-language-switcher language-switcher" role="group" aria-label="Switch language" data-i18n-aria-label="common.switchLanguage">
    <button class="language-option is-active" type="button" data-lang="en" aria-pressed="true">EN</button>
    <button class="language-option" type="button" data-lang="zh" aria-pressed="false">中文</button>
  </div>

  <main class="brutalist-container">
    <section class="control-stack">
      <header class="zone-heading">
        <span class="heading-label" data-i18n="musicPlayer.headingLabel">Ryan Station</span>
        <h1 data-i18n="musicPlayer.title">Music Zone</h1>
      </header>
      <div class="vinyl-wrapper">
        <div class="tonearm" aria-hidden="true"></div>
        <div class="vinyl-frame">
          <div class="vinyl" id="vinylDisc">
            <div class="vinyl-label" id="vinylLabel"></div>
          </div>
        </div>
      </div>
      <pre class="track-data" id="trackData">
TITLE: <span class="track-title">No music loaded</span>
ARTIST: <span class="track-artist">--</span>
DURATION: <span class="track-duration">0:00</span>
      </pre>
      <div class="ai-terminal">
        <div class="ai-terminal-header">
          <label for="ai-input" data-i18n="musicPlayer.terminal">AI TERMINAL</label>
          <button id="ai-settings-btn" class="ai-settings-btn" type="button" title="Configure Gemini API Key" data-i18n-title="musicPlayer.settings">
            <i class="fas fa-cog"></i>
          </button>
        </div>
        <div class="ai-input-row">
          <input id="ai-input" type="text" placeholder="> enter mood to hack the system" data-i18n-placeholder="musicPlayer.inputPlaceholder">
          <button id="terminal-toggle" class="terminal-toggle" type="button" aria-expanded="true" aria-controls="terminal-log" title="Collapse terminal log" data-i18n-title="musicPlayer.collapseTerminal">
            <i class="fas fa-chevron-up"></i>
          </button>
        </div>
        <div id="terminal-log" class="terminal-log" aria-live="polite">
          <div class="terminal-line system" data-i18n="musicPlayer.systemReady">&gt; SYSTEM: Ready for commands.</div>
        </div>
      </div>
    </section>

    <section class="visual-stack">
      <div class="crt-tv">
        <video id="mv-player" class="crt-video" muted playsinline preload="metadata"></video>
        <div class="static-noise"></div>
        <p class="crt-status" data-i18n="musicPlayer.noSignal">NO SIGNAL</p>
      </div>
      <div class="glitch-controls">
        <div class="time-display">
          <span id="currentTimeDisplay">0:00</span>
          <span id="totalTimeDisplay">0:00</span>
        </div>
        <label for="seekBar" class="seek-label" data-i18n="musicPlayer.signalTracking">SIGNAL TRACKING</label>
        <input type="range" id="seekBar" min="0" max="100" value="0">
        <div class="button-grid">
          <button class="glitch-btn" id="modeBtnPlayer" title="Sequential play" aria-label="Sequential play"><i class="fas fa-list-ul"></i></button>
          <button class="glitch-btn" id="prevBtnPlayer" title="Previous track" data-i18n-title="musicPlayer.controls.previous"><i class="fas fa-backward"></i></button>
          <button class="glitch-btn play-btn" id="playBtnPlayer" title="Play / Pause" data-i18n-title="musicPlayer.controls.playPause"><i class="fas fa-play" id="playIconPlayer"></i></button>
          <button class="glitch-btn" id="nextBtnPlayer" title="Next track" data-i18n-title="musicPlayer.controls.next"><i class="fas fa-forward"></i></button>
          <button class="glitch-btn" id="volumeBtn" title="Volume" data-i18n-title="musicPlayer.controls.volume"><i class="fas fa-volume-up"></i></button>
        </div>
        <div class="volume-control" id="volumeControl">
          <input type="range" min="0" max="100" value="100" id="volumeSlider">
        </div>
      </div>
    </section>
  </main>

  <div class="mascot-container">
    <img src="assets/music zone.png" alt="Ryan Station Mascot" data-i18n-alt="musicPlayer.mascotAlt">
  </div>

  <audio id="audioPlayer"></audio>
  <script src="i18n.js"></script>
  <script src="music-player.js"></script>
</body>
</html>
